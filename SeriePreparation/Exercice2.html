<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<ul id="maListe"></ul>
    <script>
	let parent = document.getElementById("maListe") ; 
	let l1 = document.createElement("li") ; 
	l1.textContent = "HTML";
	parent.append(l1);
	let l2 = document.createElement("li") ; 
	l2.textContent = "CSS";
	parent.append(l2);
	let l3 = document.createElement("li") ; 
	l3.textContent = "JavaScript";
	parent.append(l3);
	let l4 = document.createElement("li") ; 
	l4.textContent = "PHP";
	parent.insertBefore(l4 , l2) ;
	parent.lastElementChild.remove() ; 
    l5 = document.createElement("li") ;
    l5.textContent = "typescript" ;
	parent.replaceChild(l5, parent.children[0]) ;
	let h3 = document.createElement("h3") ; 
	h3.textContent = "Ma liste" ; 
	parent.before(h3)

    </script>
</body>
</html>
