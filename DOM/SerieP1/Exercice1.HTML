        function inverser(){
                if(text.textContent == "Qui est In"){
                    text.textContent = "qui est Out"
                }else{

                }

            let r = Math.floor(Math.random() * 256);

        function pluss(){
            let size = parseInt(text.style.fontSize) ;
            text.style.fontSize = `${size + 5}px`;

        function moins(){

            text.style.fontSize = `${size - 5}px`;
