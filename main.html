Exercice 6 : <br>
<input type="text" name="nom" id="n1">
<input type="text" name="nom" id="n2">
<select name="" id="options">
    <option id="1" value="+">+</option>
    <option id="2" value="-">-</option>
    <option id="3" value="*">*</option>
    <option id="4" value="/">/</option>
</select>
<br> <br>
<button type="submit"  onclick="calcule()">Calculer</button>
Resultat: <label id="res" ></label>

<script> 

    function calcuer(){
        let n1 = document.getElementById("nb1").value;
        let n2 = document.getElementById("nb2").value;  
        document.querySelector("#cal").innerHTML = +n1 + +n2;
    }
    function permuter(){
        let vv1 = document.getElementById("v1").value;
        let vv2 = document.getElementById("v2").value;
        document.getElementById("v1").value = vv2 ;
        document.getElementById("v2").value = vv1 ;
    }
    function separer(){
        let nomComplet = document.getElementById("nomComplet").value;
        let  n = nomComplet.split(' ') ;
        document.querySelector("#nom").innerHTML = " "+ n[0];
        document.querySelector("#prenom").innerHTML =" " + n[1];
    }   
    function absolue(ne){
        // let ne = document.getElementById("nombre").value;
        if(+ne > 0){
             document.querySelector("#s").innerHTML = ne;
        }else{
            document.querySelector("#s").innerHTML = -ne;
        }
    }
    function SVA(){
         let n1 = +document.getElementById("no1").value;
         let n2 = +document.getElementById("no2").value;
         if(n1 < 0){
           n1 = -n1 ;
        }
        if(n2 < 0){
           n2 = -n2 ;
        }
         document.querySelector("#re").innerHTML = n1 + n2;
    }
    function calcule(){
        let n1 = +document.getElementById("n1").value;
        let n2 = +document.getElementById("n2").value;
        let op = document.getElementById("options").value;
        if(op == "+"){
        document.querySelector("#res").innerHTML =n1 + n2 ;
         }else if(op == "-"){
        document.querySelector("#res").innerHTML =n1 - n2 ;
         }else if(op == "*"){
        document.querySelector("#res").innerHTML =n1 * n2 ;
         }else if(op == "/" ){
        document.querySelector("#res").innerHTML =n1 / n2 ;
         }else{
        document.querySelector("#res").innerHTML ="Erreur" ;
         }
    }

</script>

</body>
</html>
