        // Exercice 5 : 
        class CompteBancaire{
            constructor(titulaire , solde = 0){
                this.titulaire = titulaire ;
                this.solde = solde
            }
            deposer(montant){
                if(montant > 0){
                    this.solde += montant ;
                }else{
                    console.log("Negatiiif")
                }
            }
            retirer(montant){
                if(montant <= this.solde){
                    this.solde -= montant
                }else{
                    console.log("Insuffisaaant")
                }
            }
            afficherSolde(){
                console.log(`${this.titulaire} : ${this.solde}DH`)
            }
        }

        let n1 =  new CompteBancaire ("Nora");
        let n2 = new CompteBancaire ("Ziad" ,3000)
        n1.afficherSolde();
        n2.afficherSolde() ;
        n1.deposer(10000);
        n1.afficherSolde();
        n2.retirer(1000) ;
        n2.afficherSolde();
        n2.retirer(5000);
